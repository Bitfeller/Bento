<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento!</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div>
        <div class="top-bar">
            <div class="top-bar-side">
            
                <div class="logo" onclick="location.href='/'">
                    <img src="bento logo.svg" height="100%" alt="bento-logo" class="bento-logo">
                </div>
            </div>
            <div class="top-bar-side">
                <button id="signInBtn">Login</button>
                <button id="signUpBtn">Sign Up</button>
            </div>
        </div>

        <div id="description">
            <div id="sales-pitch">
                <p class="learning">Learn:</p>
                <div id="faster-text" class="learning" id="faster"> Faster.
                    <div id="better-text" class="learning" id="faster">Better.</div>                    
                </div>

            </div>
            <hr>
        </div>
        <div class="bento-pitch">
            <div id="bento-description">
                <p><i>Bento!</i> uses the power of SRS and specialty algorithms to <i><b>accelerate</b></i> your learning to the extreme.</p>
            </div>
            <br>
            <!-- <p>If you:</p>
            <p> • Struggle to remember things</p> -->
            <p id="call-to-action"><b id="call-to-action">sign. up. now.</b></p>
        </div>
        <br>
        <div id="big-button-container">
            <button id="bigBtn">Sign Up...</button>
        </div>
        <p id="bottom-text">「　┳━┳ ノ( ゜-゜ノ)　」</p>
        <br>
        <section id="bottom-bar">
            <div id="bottom-bar-text">
                Made by Valley & Bitfeller
            </div>
        </section>
    </div>

    <section id="modals">
        <div class="modal" id="signUpModal">
            <div class="modal-content">
                <p><u>Sign Up</u></p>
                <p>Username:</p>
                <input type="text" id="signUpUsername">
                <p>Password:</p>
                <input type="text" id="signUpPassword">
                <button class="submitBtn">Sign Up</button>
            </div>
        </div>
        <div class="modal" id="signInModal">
            <div class="modal-content">
                <p><u>Login</u></p>
                <p>Username:</p>
                <input type="text" id="signInUsername">
                <p>Password:</p>
                <input type="text" id="signInPassword">
                <button class="submitBtn">Login</button>
            </div>
        </div>
    </section>
</body>
<script type="module" src="js/sign-up-in-modal.js"></script>
</html>
