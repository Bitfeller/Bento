<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento | New Deck</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../css/main.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script type="module" src="../js/createdeck.js" type="text/javascript"></script>
    <style>
        .mc-option-sel {
            background-color: rgb(0, 150, 255);
        }
        .selbtn-select {
            background-color: rgb(0, 150, 255);
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-side">
            
            <div class="logo" onclick="location.href='/html/home.html'">
                <img src="/img/bento logo.svg" height="100%" alt="bento-logo" class="bento-logo">
                
            </div>
        </div>
        <div class="top-bar-side">

            <span class="material-symbols-outlined top-bar-icons logo" onclick="location.href='profile.html'"> <!-- Profile picture here! -->account_circle </span>
            <!-- <p>Username</p> -->
            <button class="material-symbols-outlined top-bar-icons logo" onclick="location.href='settings.html'"> Tune</button>
        </div>
    </div>
    <div id="main">
        <p>Create Deck</p>
        <input type="text" placeholder="Name" id="name"><br>
        Make public: <input type="checkbox" id="isPublic"><br>
        <input type="text" placeholder="Description" id="description"><br>
        <div id="cardcontain">
            
        </div>
        <button id="addcard">Add New Card</button>
        <button id="create">Create Deck!</button>
    </div>
</body>
</html>
