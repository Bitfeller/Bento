<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/settings.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-side">
            
            <div class="logo" onclick="location.href='/html/home.html'">
                <img src="/img/bento logo.svg" height="100%" alt="bento-logo" class="bento-logo">
                
            </div>
        </div>
        <div class="top-bar-side">

            <span class="material-symbols-outlined top-bar-icons logo" onclick="location.href='profile.html'"> <!-- Profile picture here! -->account_circle </span>
            <!-- <p>Username</p> -->
            <buton class="material-symbols-outlined top-bar-icons logo" onclick="location.href='settings.html'"> Tune</buttons>
        </div>
    </div>
    
    <div id="settings-container">

        <div class="setting-box">
            <p>Set Size:</p>
            <input type="range" min="1" max="5" value="5" class="slider"  id="set-size-slider" oninput="displaySliderValue('set-size-slider', 'set-size-output')">
            <output id="set-size-output">5</output>
        </div>
        <div class="setting-box" id="vocab-repetition-setting">
            <div>Vocab Repetition:</div>
            <div>
                <input name="radio" type="radio" checked>
                <span class="radio-label">Something</span>
            </div>
            <div>
                <input name="radio" type="radio">
                <span class="radio-label">Something Else</span>
            </div>
        </div>
        <div class="setting-box">
            <input type="checkbox">
            Show Previous Vocab
        </div>
        <div class="setting-box">
            <input type="checkbox">
            Vacation Mode
        </div>
        <div class="setting-box">
            <p>Change Password</p>
            <input type="text" class="change-input">
            <button>Submit</button>
        </div>
        <div class="setting-box">
            <p>Change Username</p>
            <input type="text" class="change-input">
            <button>Submit</button>
        </div>
        <div class="setting-box">
            <button>Delete Account</button>
        </div>
        <div class="setting-box">
            <button>Reset Account</button>
        </div>


    </div>
</body>
<script src="js/settings.js"></script>
</html>
